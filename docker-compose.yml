version: '3.8'
services:
  ollama:
    image: ollama/ollama:latest
    container_name: hundredxmind-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    command: serve
  backend:
    build: .
    container_name: hundredxmind-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    volumes:
      - ./data:/app/data
    restart: unless-stopped
volumes:
  ollama_data:
